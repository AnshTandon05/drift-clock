  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; cursor: none; background: #14102e; }
  #gl { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  .grain {
    position: fixed; inset: 0; opacity: 0.07; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }
  .stack {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; user-select: none;
    font-family: 'Mattone', sans-serif;
  }
  .clock { font-size: 14vw; line-height: 1; color: rgba(250,247,243,0.97); letter-spacing: 0.01em; }
  .date {
    margin-top: 3.2vw; font-size: 1.5vw;
    letter-spacing: 0.32em; text-indent: 0.32em;
    text-transform: uppercase; color: rgba(250,247,243,0.62);
  }

<body>
<canvas id="gl"></canvas>
<div class="grain"></div>
<div class="stack">
  <div class="clock" id="clock">8:08</div>
  <div class="date" id="date"></div>
</div>
<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', { antialias: false, depth: false, stencil: false });

const vsrc = 'attribute vec2 a; void main(){ gl_Position = vec4(a, 0.0, 1.0); }';

const fsrc = [
'precision mediump float;',
'uniform float t;',
'uniform vec2 r;',
'',
'float blob(vec2 p, vec2 c, float s){',
'  vec2 d = p - c;',
'  return exp(-dot(d,d)/(s*s));',
'}',
'',
'void main(){',
'  vec2 uv = gl_FragCoord.xy / r;',
'  vec2 p = uv; p.x *= r.x / r.y;',
'  float A = r.x / r.y;',
'',
'  p += 0.05 * vec2(sin(p.y*3.5 + t*0.6) + sin(p.y*7.0 - t*0.35),',
'                   cos(p.x*3.0 - t*0.5) + cos(p.x*6.0 + t*0.3));',
'',
'  vec3 col = mix(vec3(0.078,0.063,0.180), vec3(0.090,0.071,0.212), uv.y);',
'  col = mix(col, vec3(0.106,0.082,0.251), smoothstep(0.2,0.6,uv.y)*(1.0-smoothstep(0.6,1.0,uv.y)));',
'',
'  vec2 c1 = vec2(A*0.30 + 0.34*A*sin(t*0.43),        0.30 + 0.22*cos(t*0.31));',
'  vec2 c2 = vec2(A*0.72 + 0.30*A*cos(t*0.37 + 2.1),  0.38 + 0.26*sin(t*0.47 + 1.0));',
'  vec2 c3 = vec2(A*0.50 + 0.36*A*sin(t*0.29 + 4.2),  0.74 + 0.20*cos(t*0.41 + 2.6));',
'  vec2 c4 = vec2(A*0.22 + 0.26*A*cos(t*0.53 + 1.3),  0.66 + 0.24*sin(t*0.23 + 3.7));',
'  vec2 c5 = vec2(A*0.80 + 0.28*A*sin(t*0.33 + 5.5),  0.72 + 0.22*cos(t*0.51 + 0.6));',
'',
'  col += vec3(0.831,0.271,0.604) * blob(p, c1, 0.42) * 0.48;',
'  col += vec3(0.541,0.247,0.820) * blob(p, c2, 0.48) * 0.48;',
'  col += vec3(0.278,0.329,0.769) * blob(p, c3, 0.44) * 0.42;',
'  col += vec3(0.416,0.247,0.722) * blob(p, c4, 0.34) * 0.40;',
'  col += vec3(0.878,0.333,0.604) * blob(p, c5, 0.40) * 0.28;',
'',
'  col = col / (1.0 + max(vec3(0.0), col - 0.85) * 0.6);',
'',
'  gl_FragColor = vec4(col, 1.0);',
'}'
].join('\n');

function shader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, shader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, shader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'a');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uT = gl.getUniformLocation(prog, 't');
const uR = gl.getUniformLocation(prog, 'r');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  canvas.width  = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
addEventListener('resize', resize);

const t0 = performance.now();
function frame() {
  gl.uniform1f(uT, (performance.now() - t0) / 1000);
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
frame();

const clockEl = document.getElementById('clock');
const dateEl = document.getElementById('date');
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function tick() {
  const now = new Date();
  let h = now.getHours() % 12 || 12;
  clockEl.textContent = h + ':' + String(now.getMinutes()).padStart(2, '0');
  dateEl.textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
}
tick();
setInterval(tick, 1000);
</script>
